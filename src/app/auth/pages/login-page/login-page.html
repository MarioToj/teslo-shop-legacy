<form class="flex flex-col gap-2">
  <label class="input validator">
    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
      <g
        stroke-linejoin="round"
        stroke-linecap="round"
        stroke-width="2.5"
        fill="none"
        stroke="currentColor"
      >
        <rect width="20" height="16" x="2" y="4" rx="2"></rect>
        <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
      </g>
    </svg>
    <input type="email" placeholder="mail@site.com" required />
  </label>
  <label class="input">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36.02 48" class="h-[1em] opacity-50">
      <path
        fill="currentColor"
        d="m36.02,39.63v-21.19c0-1.12-.95-2.06-2.06-2.06h-3.76v-4.2c0-6.71-5.47-12.18-12.18-12.18S5.84,5.46,5.84,12.18v4.2h-3.72c-1.17,0-2.12.95-2.12,2.06v27.43c0,1.17.95,2.12,2.12,2.12h31.84c1.11,0,2.06-.95,2.06-2.12v-2.06H4.18v-23.25h27.66v19.07h4.18ZM10.03,12.18c0-4.41,3.59-7.99,7.99-7.99s8,3.59,8,7.99v4.19h-15.99v-4.19Z"
      />
      <path
        fill="currentColor"
        d="m18.02,38.49c1.15,0,2.09-.94,2.09-2.09v-3.03c1.33-.74,2.25-2.15,2.25-3.78,0-2.4-1.94-4.34-4.34-4.34s-4.34,1.94-4.34,4.34c0,1.63.91,3.04,2.24,3.78v3.03c0,1.15.94,2.09,2.09,2.09Z"
      />
    </svg>

    <input type="text" class="grow" placeholder="Password" />
  </label>
  <button type="submit" class="btn btn-secondary">Login</button>
  <span class="text-primary"
    >¿No tienes una cuenta?
    <a class="link-secondary cursor-pointer" routerLink="/auth/register">Crea una aquí</a></span
  >
</form>
