<div class="card bg-base-100 shadow-sm animate-fadeIn">
  <figure>
    <img [src]="product().images | ProductImagePipe" [alt]="product().title" />
  </figure>
  <div class="card-body">
    <h2
      [routerLink]="['/product-page', product().id]"
      class="card-title font-montserrat text-accent text-xl hover:underline cursor-pointer"
    >
      {{ product().title }}
    </h2>
    <p>{{ product().description | slice: 0 : 70 }}...</p>
    <div class="card-actions justify-end">
      <a class="link link-accent" [routerLink]="['/product-page', product().id]">more...</a>
    </div>
  </div>
</div>
